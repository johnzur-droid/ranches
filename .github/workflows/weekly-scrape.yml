name: Weekly Ranch Search

on:
  workflow_dispatch: {}  # manual trigger only — JZ will ask Claude to run when ready

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run search and build page
        env:
          REALTYAPI_KEY: ${{ secrets.REALTYAPI_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
          GH_OWNER: johnzur-droid
          GH_REPO: ranches
        run: python scrape.py

      - name: Commit updated state and page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/state.json docs/index.html
          git diff --quiet --cached || git commit -m "Weekly ranch search update"
          git push
