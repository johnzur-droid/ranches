name: Weekly Ranch Search

on:
  schedule:
    # Every Monday at 13:00 UTC (9:00 AM Eastern during EDT)
    # Skipping July 21 — first run July 27, 2026, then every Monday after
    - cron: '0 13 27 7 1'    # July 27 specifically
    - cron: '0 13 * 8-12 1'  # Every Monday Aug–Dec
    - cron: '0 13 * 1-6 1'   # Every Monday Jan–Jun
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run search and build page
        env:
          REALTYAPI_KEY: ${{ secrets.REALTYAPI_KEY }}
          GOOGLE_MAPS_KEY: ${{ secrets.GOOGLE_MAPS_KEY }}
          GH_OWNER: johnzur-droid
          GH_REPO: ranches
        run: python scrape.py

      - name: Commit updated state and page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/state.json docs/index.html
          git diff --quiet --cached || git commit -m "Weekly ranch search update"
          git push
